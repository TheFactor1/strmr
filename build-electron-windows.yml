name: Build Native Windows App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows-native:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Install react-native-windows
        run: |
          npm install --save-dev react-native-windows
          npx react-native-windows-init --overwrite --version "0.73.0"
          
      - name: Patch native modules for Windows compatibility
        shell: pwsh
        run: |
          # Create Windows-specific shims for problematic modules
          New-Item -ItemType Directory -Force -Path "windows/shim" | Out-Null
          
          # Shimmer shim for Windows
          @'
          import React from 'react';
          import { View, Animated } from 'react-native';
          
          export const Shimmer = ({ children, ...props }) => {
            return <View {...props}>{children}</View>;
          };
          
          export default Shimmer;
          '@ | Out-File -FilePath "windows/shim/Shimmer.js" -Encoding UTF8
          
          # Fast Image shim for Windows
          @'
          import React from 'react';
          import { Image } from 'react-native';
          
          const FastImage = (props) => {
            return <Image {...props} />;
          };
          
          FastImage.resizeMode = {
            contain: 'contain',
            cover: 'cover',
            stretch: 'stretch',
            center: 'center'
          };
          
          export default FastImage;
          '@ | Out-File -FilePath "windows/shim/FastImage.js" -Encoding UTF8
          
      - name: Update Metro config for Windows
        shell: pwsh
        run: |
          $metroConfig = @'
          const { getDefaultConfig } = require('expo/metro-config');
          const path = require('path');
          
          const config = getDefaultConfig(__dirname);
          
          // Add Windows platform
          config.resolver.platforms = ['windows', 'android', 'ios', 'web'];
          
          // Shim problematic modules for Windows
          config.resolver.resolveRequest = (context, moduleName, platform) => {
            if (platform === 'windows') {
              if (moduleName === 'react-native-shimmer-placeholder') {
                return { filePath: path.resolve(__dirname, 'windows/shim/Shimmer.js'), type: 'sourceFile' };
              }
              if (moduleName.includes('react-native-fast-image')) {
                return { filePath: path.resolve(__dirname, 'windows/shim/FastImage.js'), type: 'sourceFile' };
              }
            }
            return context.resolveRequest(context, moduleName, platform);
          };
          
          module.exports = config;
          '@
          [System.IO.File]::WriteAllText("metro.config.js", $metroConfig)
          
      - name: Create Windows app manifest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "windows/Nuvio" | Out-Null
          
          $manifest = @'
          <?xml version="1.0" encoding="utf-8"?>
          <Package xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
                   xmlns:mp="http://schemas.microsoft.com/appx/2014/phone/manifest"
                   xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10">
            <Identity Name="NuvioMediaHub" Version="1.0.0.0" Publisher="CN=Nuvio" />
            <Properties>
              <DisplayName>Nuvio Media Hub</DisplayName>
              <PublisherDisplayName>Nuvio</PublisherDisplayName>
              <Logo>Assets\StoreLogo.png</Logo>
            </Properties>
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />
            </Dependencies>
            <Resources>
              <Resource Language="x-generate"/>
            </Resources>
            <Applications>
              <Application Id="App" Executable="$targetnametoken$.exe" EntryPoint="$targetentrypoint$">
                <uap:VisualElements DisplayName="Nuvio" Square150x150Logo="Assets\Square150x150Logo.png"
                                    Square44x44Logo="Assets\Square44x44Logo.png" Description="Modern Media Hub"
                                    BackgroundColor="transparent">
                  <uap:DefaultTile Wide310x150Logo="Assets\Wide310x150Logo.png" Square71x71Logo="Assets\SmallTile.png" Square310x310Logo="Assets\LargeTile.png"/>
                  <uap:SplashScreen Image="Assets\SplashScreen.png" />
                </uap:VisualElements>
              </Application>
            </Applications>
          </Package>
          '@
          [System.IO.File]::WriteAllText("windows/Nuvio/Package.appxmanifest", $manifest)
          
      - name: Build Windows app
        run: |
          npx react-native run-windows --release --no-launch
        env:
          SOLUTION_FILE: windows/Nuvio.sln
          CONFIGURATION: Release
          PLATFORM: x64
          
      - name: Package as MSIX for distribution
        shell: pwsh
        run: |
          # Find the built app
          $appxPath = Get-ChildItem -Path "windows/AppPackages" -Recurse -Filter "*.msix" | Select-Object -First 1
          if ($appxPath) {
            Copy-Item $appxPath.FullName -Destination "Nuvio-Windows.msix"
            Write-Host "✓ MSIX package created"
          } else {
            Write-Host "Creating portable version..."
            # Fallback: create a portable zip of the app
            $exePath = Get-ChildItem -Path "windows/x64/Release" -Filter "*.exe" | Where-Object { $_.Name -notlike "*test*" } | Select-Object -First 1
            if ($exePath) {
              Compress-Archive -Path $exePath.DirectoryName -DestinationPath "Nuvio-Windows-Portable.zip"
              Write-Host "✓ Portable zip created"
            }
          }
          
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nuvio-Windows-Native
          path: |
            *.msix
            *.zip
            windows/AppPackages/**/*.msix
            windows/x64/Release/*.exe
          retention-days: 30