name: Build Native Windows App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows-native:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Install react-native-windows
        run: |
          npm install --save-dev react-native-windows
          npx react-native-windows-init --overwrite --version "0.73.0"
          
      - name: Create Windows shims
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "windows/shim" | Out-Null
          
          @'
          import React from 'react';
          import { View } from 'react-native';
          export const Shimmer = ({ children, ...props }) => <View {...props}>{children}</View>;
          export default Shimmer;
          '@ | Out-File -FilePath "windows/shim/Shimmer.js" -Encoding UTF8
          
          @'
          import React from 'react';
          import { Image } from 'react-native';
          const FastImage = (props) => <Image {...props} />;
          FastImage.resizeMode = { contain: 'contain', cover: 'cover', stretch: 'stretch', center: 'center' };
          export default FastImage;
          '@ | Out-File -FilePath "windows/shim/FastImage.js" -Encoding UTF8
          
      - name: Update Metro config
        shell: pwsh
        run: |
          $metroConfig = @'
          const { getDefaultConfig } = require('expo/metro-config');
          const path = require('path');
          const config = getDefaultConfig(__dirname);
          config.resolver.platforms = ['windows', 'android', 'ios', 'web'];
          config.resolver.resolveRequest = (context, moduleName, platform) => {
            if (platform === 'windows') {
              if (moduleName === 'react-native-shimmer-placeholder') {
                return { filePath: path.resolve(__dirname, 'windows/shim/Shimmer.js'), type: 'sourceFile' };
              }
              if (moduleName.includes('react-native-fast-image')) {
                return { filePath: path.resolve(__dirname, 'windows/shim/FastImage.js'), type: 'sourceFile' };
              }
            }
            return context.resolveRequest(context, moduleName, platform);
          };
          module.exports = config;
          '@
          [System.IO.File]::WriteAllText("metro.config.js", $metroConfig)
          
      - name: Build Windows app
        run: npx react-native run-windows --release --no-launch
        env:
          CONFIGURATION: Release
          PLATFORM: x64
          
      - name: Package app
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path "windows/x64/Release" -Filter "*.exe" | Where-Object { $_.Name -notlike "*test*" } | Select-Object -First 1
          if ($exePath) {
            Compress-Archive -Path $exePath.DirectoryName -DestinationPath "Nuvio-Windows.zip"
            Write-Host "✓ Windows build packaged"
          }
          
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nuvio-Windows
          path: |
            *.zip
            windows/x64/Release/*.exe
          retention-days: 30