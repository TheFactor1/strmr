name: Build Windows Electron App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-electron-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI and web dependencies
        run: |
          npm install --save-dev expo @expo/webpack-config
          npx expo install react-native-web react-dom

      - name: COMPLETELY REMOVE AND REPLACE @d11/react-native-fast-image for web
        shell: pwsh
        run: |
          # Delete the problematic file entirely
          $problemFile = "node_modules/@d11/react-native-fast-image/src/FastImageViewNativeComponent.ts"
          if (Test-Path $problemFile) {
            Remove-Item $problemFile -Force
            Write-Host "Removed problematic FastImageViewNativeComponent.ts"
          }
          
          # Replace the index.tsx to not reference the deleted file
          $indexFile = "node_modules/@d11/react-native-fast-image/src/index.tsx"
          if (Test-Path $indexFile) {
            $newIndex = @'
          import React from "react";
          import { Image, ImageProps, StyleSheet, Platform } from "react-native";
          
          export type Source = any;
          export type OnLoadEvent = any;
          export type OnProgressEvent = any;
          export type ResizeMode = "contain" | "cover" | "stretch" | "center";
          
          export const FastImage = (props: any) => {
            const { source, style, resizeMode, onLoad, onError, ...rest } = props;
            return React.createElement(Image, {
              source: source,
              style: [style, resizeMode && { resizeMode }],
              onLoad: onLoad,
              onError: onError,
              ...rest
            });
          };
          
          FastImage.resizeMode = {
            contain: "contain",
            cover: "cover",
            stretch: "stretch",
            center: "center"
          };
          
          FastImage.priority = { low: "low", normal: "normal", high: "high" };
          FastImage.cacheControl = { immutable: "immutable", web: "web", cacheOnly: "cacheOnly" };
          FastImage.preload = () => {};
          FastImage.clearMemoryCache = () => Promise.resolve();
          FastImage.clearDiskCache = () => Promise.resolve();
          
          export default FastImage;
          '@
            [System.IO.File]::WriteAllText($indexFile, $newIndex)
            Write-Host "Replaced index.tsx with web-compatible version"
          }

      - name: Create web stubs directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "web-stubs" | Out-Null

      - name: Create complete react-native web shim
        shell: pwsh
        run: |
          $rnShim = @'
          // Complete React Native web shim
          export const codegenNativeComponent = () => {
            return (props) => null;
          };
          
          export const TurboModuleRegistry = {
            get: () => null,
            getEnforcing: () => {
              throw new Error("TurboModules not supported on web");
            }
          };
          
          export const NativeModules = {};
          export const NativeEventEmitter = class {
            addListener() {}
            removeListener() {}
            removeAllListeners() {}
          };
          '@
          [System.IO.File]::WriteAllText("web-stubs/react-native-shim.js", $rnShim)

      - name: Create Metro config with aggressive stubbing
        shell: pwsh
        run: |
          $metroConfig = @'
          const { getDefaultConfig } = require("expo/metro-config");
          const path = require("path");

          const config = getDefaultConfig(__dirname);
          const webStubs = path.resolve(__dirname, "web-stubs");

          config.resolver.resolveRequest = (context, moduleName, platform) => {
            if (platform === "web") {
              // Block ANY react-native internal imports
              if (moduleName.includes("react-native/Libraries/")) {
                console.log(`[Metro] Stubbing react-native internal: ${moduleName}`);
                return { filePath: path.join(webStubs, "react-native-shim.js"), type: "sourceFile" };
              }
              
              // Block codegenNativeComponent
              if (moduleName.includes("codegenNativeComponent")) {
                console.log(`[Metro] Stubbing codegenNativeComponent: ${moduleName}`);
                return { filePath: path.join(webStubs, "react-native-shim.js"), type: "sourceFile" };
              }
            }
            return context.resolveRequest(context, moduleName, platform);
          };

          module.exports = config;
          '@
          [System.IO.File]::WriteAllText("metro.config.js", $metroConfig)

      - name: Build Expo web bundle
        run: npx expo export --platform web --output-dir web-build
        env:
          NODE_ENV: production
          SENTRY_DISABLE_AUTO_UPLOAD: true
          EXPO_USE_FAST_RESOLVER: true
          EXPO_DEBUG: true

      - name: Debug web-build output
        shell: pwsh
        run: |
          if (Test-Path "web-build") {
            Write-Host "✓ web-build directory exists"
            if (Test-Path "web-build/index.html") {
              Write-Host "✓ index.html found!"
            } else {
              Write-Host "✗ ERROR: index.html not found!"
              Get-ChildItem "web-build"
              exit 1
            }
          } else {
            Write-Host "✗ ERROR: web-build directory not created!"
            exit 1
          }

      - name: Create Electron wrapper
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "electron" | Out-Null

          $mainJs = @'
          const { app, BrowserWindow, shell } = require("electron");
          const path = require("path");
          const { pathToFileURL } = require("url");

          function createWindow() {
            const win = new BrowserWindow({
              width: 1280,
              height: 800,
              minWidth: 900,
              minHeight: 600,
              title: "Nuvio Media Hub",
              backgroundColor: "#000000",
              webPreferences: {
                nodeIntegration: false,
                contextIsolation: true,
                webSecurity: false,
              },
            });
            win.setMenuBarVisibility(false);
            const indexPath = path.join(__dirname, "..", "web-build", "index.html");
            win.loadURL(pathToFileURL(indexPath).toString());
            win.webContents.setWindowOpenHandler(({ url }) => {
              shell.openExternal(url);
              return { action: "deny" };
            });
          }

          app.whenReady().then(createWindow);
          app.on("window-all-closed", () => app.quit());
          app.on("activate", () => {
            if (BrowserWindow.getAllWindows().length === 0) createWindow();
          });
          '@
          [System.IO.File]::WriteAllText("electron/main.js", $mainJs)

      - name: Create Electron package.json
        shell: pwsh
        run: |
          $electronPkg = @'
          {
            "name": "nuvio-desktop",
            "version": "1.0.0",
            "description": "Nuvio Media Hub for Windows",
            "main": "electron/main.js",
            "author": "Nuvio",
            "license": "GPL-3.0",
            "build": {
              "appId": "com.nuvio.desktop",
              "productName": "Nuvio Media Hub",
              "directories": { "output": "dist" },
              "files": ["electron/**/*", "web-build/**/*"],
              "win": {
                "target": [
                  { "target": "nsis", "arch": ["x64"] },
                  { "target": "portable", "arch": ["x64"] }
                ]
              },
              "nsis": {
                "oneClick": false,
                "allowToChangeInstallationDirectory": true,
                "createDesktopShortcut": true,
                "createStartMenuShortcut": true
              }
            }
          }
          '@
          [System.IO.File]::WriteAllText("electron-package.json", $electronPkg)

      - name: Install Electron builder
        run: |
          npm install --save-dev electron@^28.0.0 electron-builder@^24.13.3 --legacy-peer-deps

      - name: Build Windows executable
        shell: pwsh
        run: npx electron-builder --config electron-package.json --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nuvio-Windows
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/*.nsis*
            dist/*.portable.exe
          retention-days: 30